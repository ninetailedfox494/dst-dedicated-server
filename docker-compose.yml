services:
  dst-master:
    build: .
    image: dst-dedicated:latest
    env_file:
      - ./env/.env
    environment:
      DST_SHARD_NAME: Master
    ports:
      - "10999:10999/udp"
      - "27016:27016/udp"
      - "8766:8766/udp"
    volumes:
      - ./data/cluster:/home/dst/.klei/DoNotStarveTogether/${DST_CLUSTER_NAME}
      - ./data/master:/home/dst/.klei/DoNotStarveTogether/${DST_CLUSTER_NAME}/Master
      - ./data/mods:/home/dst/dst_server/mods
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f dontstarve_dedicated_server_nullrenderer_x64 >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5

  dst-caves:
    image: dst-dedicated:latest
    env_file:
      - ./env/.env
    environment:
      DST_SHARD_NAME: Caves
    ports:
      - "10998:10998/udp"
      - "27017:27017/udp"
      - "8767:8767/udp"
    volumes:
      - ./data/cluster:/home/dst/.klei/DoNotStarveTogether/${DST_CLUSTER_NAME}
      - ./data/caves:/home/dst/.klei/DoNotStarveTogether/${DST_CLUSTER_NAME}/Caves
      - ./data/mods:/home/dst/dst_server/mods
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f dontstarve_dedicated_server_nullrenderer_x64 >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5

  mod-updater:
    image: dst-dedicated:latest
    env_file:
      - ./env/.env
    environment:
      DST_SHARD_NAME: Master
      MODS_FILE: /workspace/env/mods.txt
    command: ["/workspace/scripts/reset_and_install_mods_docker.sh"]
    volumes:
      - ./:/workspace
      - ./data/cluster:/home/dst/.klei/DoNotStarveTogether/${DST_CLUSTER_NAME}
      - ./data/master:/home/dst/.klei/DoNotStarveTogether/${DST_CLUSTER_NAME}/Master
      - ./data/caves:/home/dst/.klei/DoNotStarveTogether/${DST_CLUSTER_NAME}/Caves
      - ./data/mods:/home/dst/dst_server/mods
    profiles:
      - tools

  access-manager:
    image: dst-dedicated:latest
    env_file:
      - ./env/.env
    command: ["/workspace/scripts/set_access_lists.sh"]
    volumes:
      - ./:/workspace
      - ./data/cluster:/home/dst/.klei/DoNotStarveTogether/${DST_CLUSTER_NAME}
    profiles:
      - tools
